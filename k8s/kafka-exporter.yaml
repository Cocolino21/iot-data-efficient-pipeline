apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: iot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:latest
          args:
            - --kafka.server=host.minikube.internal:9094
          ports:
            - containerPort: 9308
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: iot
spec:
  type: ClusterIP
  selector:
    app: kafka-exporter
  ports:
    - port: 9308
      targetPort: 9308
