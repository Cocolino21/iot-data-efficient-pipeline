apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: iot
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: "kafka-exporter"
        scrape_interval: 1s
        scrape_timeout: 1s
        static_configs:
          - targets: ["kafka-exporter:9308"]

      - job_name: "postgres-exporter"
        static_configs:
          - targets: ["postgres-exporter:9187"]

      - job_name: "emqx"
        static_configs:
          - targets: ["host.minikube.internal:18083"]
        metrics_path: /api/v5/prometheus/stats

      - job_name: "traffic-control"
        scrape_interval: 1s
        scrape_timeout: 1s
        static_configs:
          - targets: ["traffic-control:8082"]
        metrics_path: /actuator/prometheus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: iot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: iot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: iot
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
