global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "emqx"
    metrics_path: "/api/v5/prometheus/stats"
    static_configs:
      - targets: ["emqx-dt:18083"]
