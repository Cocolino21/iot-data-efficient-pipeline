node {
  name     = "emqx@127.0.0.1"
  cookie   = "emqxsecretcookie"
  data_dir = "/opt/emqx/data"
}

mqtt {
  max_mqueue_len = 1000000
  max_inflight = 128
  mqueue_store_qos0 = true
}

authorization {
  no_match = allow
  deny_action = ignore
}

listeners.tcp.default {
  max_connections = 2000000
}

dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  default_password = "public"
}

connectors {
  kafka_producer {
    kafka_out {
      bootstrap_hosts = "kafka:29092"
    }
  }

  kafka_consumer {
    kafka_cmd_in {
      bootstrap_hosts = "kafka:29092"
    }
  }

  influxdb {
    influx_out {
      server = "influxdb:8086"
      parameters {
        influxdb_type = influxdb_api_v2
        bucket = "sensor_data"
        org = "iot"
        token = "my-secret-token"
      }
    }
  }
}

actions {
  kafka_producer {
    dt_to_kafka {
      connector = kafka_out
      parameters {
        topic = "telemetry.observations"
        message {
          key   = "${datastream_id}"
          # Explicit JSON so the payload shape is exactly what sink-service expects.
          value = "{\"thing_id\":\"${thing_id}\",\"datastream_id\":\"${datastream_id}\",\"timestamp\":\"${device_ts}\",\"value\":${value}}"
        }
        partition_strategy = key_dispatch
        required_acks      = leader_only
        max_linger_time    = "20ms"
        max_linger_bytes   = "1MB"
        max_batch_bytes    = "256KB"
        max_inflight       = 5
        buffer {
          mode                = memory
          per_partition_limit = 256MB
          segment_bytes       = 100MB
        }
      }
    }
  }

}

sources {
  kafka_consumer {
    cmd_source {
      connector = kafka_cmd_in
      parameters {
        topic    = "commands.devices"
        group_id = "emqx-commands"
      }
    }
  }
}

rule_engine {
  rules {
    # dt/# → Kafka + InfluxDB.
    # Topic format: dt/<thing_id>/<datastream_id>
    dt_fanout {
      sql = """
        SELECT
          payload.value              as value,
          payload.timestamp          as device_ts,
          nth(2, tokens(topic, '/')) as thing_id,
          nth(3, tokens(topic, '/')) as datastream_id
        FROM "dt/#"
      """
      actions = [
        "kafka_producer:dt_to_kafka",
        "influxdb:dt_to_influx"
      ]
    }

    # Kafka commands.devices → MQTT cmd/config/<thing_id>.
    cmd_to_mqtt {
      sql = """
        SELECT
          payload,
          payload.thing_id as thing_id
        FROM "$bridges/kafka_consumer:cmd_source"
      """
      actions = [
        {
          function = republish
          args {
            topic   = "cmd/config/${thing_id}"
            payload = "${payload}"
            qos     = 0
          }
        }
      ]
    }
  }
}
