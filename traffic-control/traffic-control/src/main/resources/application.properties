spring.application.name=traffic-control
server.port=8082

# Expose Prometheus scrape endpoint at /actuator/prometheus
management.endpoints.web.exposure.include=health,prometheus

controller.poll-interval-ms=10000
controller.prometheus.url=http://localhost:9090
# Sum the reliable per-partition series (the exporter's _sum drops ~12% under load).
# avg_over_time over 60s: the sink commits offsets ~once per second, so raw lag is a
# 1s-period sawtooth; averaging over ~60 teeth reads the mean backlog instead of a
# random phase of the tooth. avg ignores missing samples, so a dropped scrape does
# not pull the value toward 0 (this replaces the old last_over_time carry-forward).
controller.prometheus.lag-query=avg_over_time(sum(kafka_consumergroup_lag{topic="telemetry.observations"})[60s:5s])
# EMQX 5.x exposes bridge/action metrics as emqx_action_* (singular) on the
# /api/v5/prometheus/data_integration endpoint (scraped as its own Prometheus job).
controller.prometheus.emqx-drop-query=rate(emqx_action_dropped{id="kafka_producer:dt_to_kafka"}[1m])

controller.mqtt.broker=tcp://localhost:1883
controller.mqtt.client-id=traffic-control
controller.mqtt.broadcast-topic=cmd/control/broadcast

# Loop starts disabled: an operator explicitly picks a controller in the UI.
controller.mode=none
controller.dead-zone=1.0

# PID controller tuning (error is relative: (lag-target)/target)
pid.target-lag=5000
# +10% threshold per tick when lag is at 2x target; saturates (+50) at 6x target
pid.kp=10
# The actuator is cumulative (threshold *= 1+pct/100), so the plant already
# integrates: P-only gives zero steady-state error. Ki>0 would double-integrate
# and re-invite oscillation; keep it available for experiments but default 0.
pid.ki=0
pid.kd=0.00
# Integral clamp in relative-error-seconds (e.g. 100% deviation sustained 30s).
# Only relevant when Ki > 0.
pid.integral-max=30
pid.output-min=-20
pid.output-max=50

# Hysteresis controller tuning (asymmetric: shed fast, relax slow).
# Inside [lower-lag, upper-lag] the controller holds (no broadcasts).
hysteresis.upper-lag=8000
hysteresis.lower-lag=3000
# Shed = step + gain * (lag-upper)/upper: +10% at the edge, +20% at 2x the edge.
hysteresis.step=10
# Extra shed percent per 100% relative overshoot (was raw-units 0.001).
hysteresis.gain=10
# Flat relax percent per tick below the band. Small on purpose: the actuator is
# cumulative, so a gentle decay lets traffic creep back without re-overshooting.
hysteresis.relax-step=3
hysteresis.output-min=-20
hysteresis.output-max=50

# Calibration orchestrator
calibration.max-concurrent=5
calibration.collection-ttl-seconds=86400
calibration.baseline-days=5
calibration.poll-interval-ms=60000
# Relative drift threshold: flag when mean |actual-expected| exceeds this
# fraction of the stream's own mean baseline level (unit-independent).
calibration.drift-threshold=0.15
# Minimum joined baseline-hours in the drift window before the score is trusted.
calibration.min-hours=24

# Gap reconstruction (Datastreams inspector). Energy streams (observation_type
# = 'energy') use the baseline's hour-of-day shape anchored to the gap's
# measured endpoints; others use linear interpolation.
reconstruction.gap-seconds=5
reconstruction.max-points-per-gap=60
# Trust gate: above this relative drift the baseline is considered stale and
# reconstruction falls back to interpolation until recalibration.
reconstruction.max-drift=0.15

# EMQX auto-tuning
emqx.enabled=false
emqx.api-url=http://localhost:18083
emqx.api-user=admin
emqx.api-password=public
emqx.action-id=kafka_producer:dt_to_kafka
emqx.drop-rate-threshold=1.0
emqx.cooldown-polls=3
emqx.default-max-linger-time=20ms
emqx.default-max-linger-bytes=1MB
emqx.default-max-batch-bytes=1MB
emqx.default-max-inflight=32
emqx.upper-max-linger-time=50ms
emqx.upper-max-linger-bytes=4MB
emqx.upper-max-batch-bytes=4MB
emqx.upper-max-inflight=128

# TimescaleDB
spring.datasource.url=jdbc:postgresql://localhost:5432/iot
spring.datasource.username=postgres
spring.datasource.password=postgres
