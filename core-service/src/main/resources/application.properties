spring.application.name=core-service
server.port=8083

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/iot}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.demo.seed=${APP_DEMO_SEED:true}

app.jwt.secret=${APP_JWT_SECRET:dev-only-secret-please-override-in-prod-32bytes-min!!!}
app.jwt.ttl-minutes=${APP_JWT_TTL_MINUTES:720}
app.jwt.cookie-name=auth

logging.level.com.licenta.coreservice=INFO
